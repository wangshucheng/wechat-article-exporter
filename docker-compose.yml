# 微信公众号文章批量下载工具 - Docker Compose 部署
#
# 使用方法：
#   1. 使用预构建镜像启动（默认，最快）：docker compose up -d
#   2. 本地构建后启动：docker compose up -d --build
#   3. 停止并清理：docker compose down
#   4. 访问：http://localhost:3000
#
# 数据持久化：登录态、文章缓存等存储在宿主机 ./.data 目录，容器重建后不会丢失。

services:
  wechat-article-exporter:
    # 默认使用 GHCR 预构建镜像（CI 自动构建，支持 linux/amd64 与 linux/arm64）
    # 如需基于本地代码构建，注释下面一行，并取消注释下方 build 配置
    # image: ghcr.io/wechat-article/wechat-article-exporter:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: local
    container_name: wechat-article-exporter
    ports:
      - "3000:3000"
    volumes:
      # 持久化 KV 存储数据（登录 Cookie、文章缓存、请求日志等）
      - ./.data:/app/.data
    environment:
      - NODE_ENV=production
      # KV 存储驱动：本地/Docker 使用 fs 文件系统
      - NITRO_KV_DRIVER=fs
      - NITRO_KV_BASE=.data/kv
      # AG-Grid 企业版授权密钥（可选，留空使用社区版功能）
      - NUXT_AGGRID_LICENSE=
      # 调试端点认证密钥（可选）
      - DEBUG_KEY=
      # 调试微信代理请求（仅开发环境生效，生产环境固定为 false）
      - NUXT_DEBUG_MP_REQUEST=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
